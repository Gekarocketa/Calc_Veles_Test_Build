<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перенаправление - LetsExchange Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #161616;
            --card-bg: rgba(30, 30, 30, 0.75);
            --text-color: #ffffff;
            --primary-accent: #3A7DFF;
            --secondary-accent: #2CD4A7;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Glows */
        .glow-1 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(58, 125, 255, 0.12) 0%, rgba(58, 125, 255, 0) 70%);
            top: -150px;
            left: -150px;
            z-index: 1;
        }

        .glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(44, 212, 167, 0.09) 0%, rgba(44, 212, 167, 0) 70%);
            bottom: -150px;
            right: -150px;
            z-index: 1;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 48px 40px;
            width: 500px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5), 0 0 1px 1px var(--border-color);
            z-index: 2;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .logo-lets {
            color: var(--secondary-accent);
        }

        .logo-exchange {
            color: var(--primary-accent);
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: -0.2px;
        }

        p {
            color: #aaa;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .data-info {
            background: rgba(44, 212, 167, 0.06);
            border: 1px solid rgba(44, 212, 167, 0.15);
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 0.88rem;
            color: var(--secondary-accent);
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 500;
        }

        /* Countdown circle */
        .timer-container {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto 32px auto;
        }

        .timer-svg {
            transform: rotate(-90deg);
            width: 90px;
            height: 90px;
        }

        .timer-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 5;
        }

        .timer-bar {
            fill: none;
            stroke: var(--primary-accent);
            stroke-width: 5;
            stroke-linecap: round;
            stroke-dasharray: 226;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.7rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
        }

        .btn-redirect {
            background: linear-gradient(135deg, var(--primary-accent) 0%, #1A5ad6 100%);
            border: none;
            color: white;
            padding: 18px 32px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 8px 20px rgba(58, 125, 255, 0.25);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-redirect:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(58, 125, 255, 0.4);
            filter: brightness(1.1);
        }

        .btn-redirect:active {
            transform: translateY(0);
        }

        .btn-redirect svg {
            transition: transform 0.3s;
        }

        .btn-redirect:hover svg {
            transform: translateX(4px);
        }
    </style>
</head>

<body>
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div class="container">
        <div class="logo">
            <span class="logo-lets">Lets</span><span class="logo-exchange">Exchange</span>
        </div>

        <h2>Калькулятор переехал</h2>
        <p>Мы объединили версии! Тестовый билд закрыт, теперь вся команда работает на единой стабильной и быстрой платформе.</p>

        <div class="data-info">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink: 0;">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            Ваши настройки, история и партнеры уже перенесены!
        </div>

        <div class="timer-container">
            <svg class="timer-svg" viewBox="0 0 80 80">
                <circle class="timer-bg" cx="40" cy="40" r="36"></circle>
                <circle class="timer-bar" id="timerBar" cx="40" cy="40" r="36"></circle>
            </svg>
            <div class="timer-text" id="countdown">5</div>
        </div>

        <button class="btn-redirect" onclick="redirectToMain()">
            Перейти к калькулятору
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </button>
    </div>

    <script>
        const targetUrl = 'https://gekarocketa.github.io/VelesCalcForLE/';
        let count = 5;
        const countdownEl = document.getElementById('countdown');
        const timerBar = document.getElementById('timerBar');
        const totalLength = 2 * Math.PI * 36; // 226.19

        // Set initial stroke
        timerBar.style.strokeDasharray = totalLength;
        timerBar.style.strokeDashoffset = 0;

        const interval = setInterval(() => {
            count--;
            countdownEl.textContent = count;

            // Animate progress circle stroke
            const percent = count / 5;
            timerBar.style.strokeDashoffset = totalLength * (1 - percent);

            if (count <= 0) {
                clearInterval(interval);
                redirectToMain();
            }
        }, 1000);

        function redirectToMain() {
            window.location.href = targetUrl;
        }
    </script>
</body>

</html>
